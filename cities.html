<!doctype html><html><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>transit4 · cities</title>
<style>
 :root{--teal:#00695C;--line:#e6ebe9;--muted:#667085;--bg:#f6faf9}
 *{box-sizing:border-box} body{margin:0;font:14px -apple-system,Segoe UI,Roboto,sans-serif;color:#14302c;background:var(--bg)}
 .wrap{max-width:780px;margin:0 auto;padding:18px}
 h2{font-size:16px;margin:0 0 4px;color:var(--teal)} .sub{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:14px}
 .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
 .card{flex:1;min-width:210px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
 .city{font-weight:700;color:var(--teal)} .big{font:700 24px -apple-system,Segoe UI,Roboto,sans-serif}
 .k{color:var(--muted);font-size:11px} table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
 td,th{padding:5px 7px;border-top:1px solid var(--line);text-align:right} td:first-child,th:first-child{text-align:left}
 thead th{border:0;color:var(--muted);font-weight:500} .badge{font-size:11px;background:#e7f4ed;color:#1b7a4b;border-radius:10px;padding:2px 8px}
 .hint{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:14px}
</style></head><body>
<div class=wrap>
 <h2>US metros — one model, calibrated per city</h2>
 <div class=sub>The same census-anchored four-step model run on multiple metros. Each city is calibrated to ITS OWN observed targets — transit mode share (ACS) and mean trip length (NHTS) — so the numbers are comparable apples-to-apples.</div>
 <div class=cards id=cards></div>
 <div id=scen></div>
 <div class=hint id=note></div>
</div>
<script>
fetch('cities_compare.json').then(r=>r.json()).then(d=>{
 document.getElementById('cards').innerHTML = d.cities.map(c=>{
   const b=c.scenarios[0];
   return `<div class=card><div class=city>${c.name}</div><div style='font-size:10px;color:#8a94a6'>${c.tier||''}</div>
     <div class=big>${b.transit_pct}%</div><div class=k>transit mode share (target ${c.target_share_pct}%) <span class=badge>calibrated</span></div>
     <table><tr><td>Avg trip</td><td>${b.avg_trip_mi} mi</td></tr>
     <tr><td>Transit trips/day</td><td>${b.transit_trips.toLocaleString()}</td></tr>
     <tr><td>β / calib</td><td>${c.beta} / ${c.calib}</td></tr></table></div>`;
 }).join('');
 // per-city scenario tables
 document.getElementById('scen').innerHTML = d.cities.map(c=>`
   <div class=card style="margin-bottom:10px"><div class=city>${c.name} — scenarios</div>
   <table><thead><tr><th>scenario</th><th>share %</th><th>transit trips</th><th>avg mi</th></tr></thead>
   <tbody>${c.scenarios.map(s=>`<tr><td>${s.label}</td><td>${s.transit_pct}</td><td>${s.transit_trips.toLocaleString()}</td><td>${s.avg_trip_mi}</td></tr>`).join('')}</tbody></table></div>`).join('');
 document.getElementById('note').textContent = d.note;
}).catch(e=>{document.getElementById('cards').innerHTML='cities data not found';});
</script></body></html>
