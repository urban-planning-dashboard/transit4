<!doctype html><html><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>transit4 · live model</title>
<style>
 :root{--teal:#00695C;--line:#e6ebe9;--muted:#667085;--bg:#f6faf9}
 *{box-sizing:border-box} body{margin:0;font:14px -apple-system,Segoe UI,Roboto,sans-serif;color:#14302c;background:var(--bg)}
 .wrap{max-width:740px;margin:0 auto;padding:16px}
 h2{font-size:16px;margin:0 0 2px;color:var(--teal)} .sub{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:10px}
 .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#bbb;margin-right:5px}
 .dot.on{background:#1b7a4b;animation:p 1.5s infinite} @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
 .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
 label{display:block;font-size:11px;color:var(--muted);margin:6px 0 2px} input{width:100%;font:inherit;padding:7px;border:1px solid var(--line);border-radius:8px}
 .row{display:flex;gap:10px;flex-wrap:wrap} .row>div{flex:1;min-width:120px}
 button{margin-top:12px;background:var(--teal);color:#fff;border:0;border-radius:9px;padding:10px 18px;font:inherit;font-weight:600;cursor:pointer}
 table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px} td,th{padding:5px 7px;border-top:1px solid var(--line);text-align:right} td:first-child,th:first-child{text-align:left}
 thead th{border:0;color:var(--muted);font-weight:500} .big{font:700 22px -apple-system,Segoe UI,Roboto,sans-serif;color:var(--teal)}
 .k{font-size:11px;color:var(--muted)} .kv{display:flex;gap:14px;flex-wrap:wrap}
</style></head><body>
<div class=wrap>
 <h2>Live model run <span class=k id=status><span class=dot></span>checking forge…</span></h2>
 <div class=sub>Runs the four-step model LIVE on the forge compute server (via the secure proxy) — not a cached snapshot. Set the inputs and Run; results come back in ~1s. (Forge currently has Chicago loaded.)</div>
 <div class=card>
  <div class=row>
   <div><label>Year</label><input id=year type=number value=2019></div>
   <div><label>β (distance decay)</label><input id=beta type=number step=0.001 value=0.06></div>
   <div><label>Transit calib</label><input id=calib type=number step=0.01 value=1.0></div>
   <div><label>Top corridors</label><input id=top type=number value=25></div>
  </div>
  <button id=run>▶ Run on forge</button>
 </div>
 <div id=out></div>
</div>
<script>
const BASE='https://167.233.64.97/model';
const $=id=>document.getElementById(id);
fetch(BASE+'/health').then(r=>r.json()).then(j=>{
 $('status').innerHTML=`<span class="dot on"></span>forge live · ${j.service}`;
}).catch(()=>{$('status').innerHTML='<span class=dot></span>forge unreachable';});
$('run').onclick=async()=>{
 $('out').innerHTML='<div class=card>running on forge…</div>'; const t0=performance.now();
 try{
  const r=await fetch(BASE+'/scenario',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({year:+$('year').value,beta:+$('beta').value,transit_calib:+$('calib').value,top_corridors:+$('top').value})});
  const d=await r.json(); const ms=Math.round(performance.now()-t0); const s=d.summary||{};
  $('out').innerHTML=`
   <div class=card><div class=k>ran live on forge in ${ms} ms · ${s.n_zones?.toLocaleString()} zones</div>
    <div class=big>${s.transit_pct}% transit share</div>
    <div class=kv><span class=k>avg trip <b>${s.avg_trip_mi} mi</b></span><span class=k>total trips <b>${Math.round(s.total_trips).toLocaleString()}</b></span>
    <span class=k>transit trips <b>${Math.round(s.transit_trips).toLocaleString()}</b></span>
    <span class=k>jobs reachable 45min <b>${Math.round(s.jobs_within_45min_transit).toLocaleString()}</b></span></div></div>
   <div class=card><b>Towns</b>
    <table><thead><tr><th>town</th><th>workers</th><th>jobs</th><th>transit %</th></tr></thead>
    <tbody>${(d.towns||[]).map(t=>`<tr><td>${t.town||t.name}</td><td>${Math.round(t.workers||t.productions||0).toLocaleString()}</td>
      <td>${Math.round(t.jobs||t.attractions||0).toLocaleString()}</td><td>${(t.transit_pct??t.transit_share*100??'')||''}</td></tr>`).join('')}</tbody></table></div>`;
 }catch(e){ $('out').innerHTML='<div class=card>run failed — forge may be busy or the token is required. '+e+'</div>'; }
};
</script></body></html>
