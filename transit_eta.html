<!doctype html><html><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>transit4 · live ETA</title>
<link rel=stylesheet href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
 :root{--teal:#00695C;--line:#e6ebe9;--muted:#667085;--bg:#f6faf9;--warn:#b54708;--ok:#1b7a4b}
 *{box-sizing:border-box} html,body{margin:0;height:100%} body{font:14px -apple-system,Segoe UI,Roboto,sans-serif;color:#14302c;background:var(--bg);display:flex;flex-direction:column}
 header{padding:8px 12px;background:var(--teal);color:#fff;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
 header b{font-size:15px} .pill{font-size:11px;background:rgba(255,255,255,.18);padding:2px 8px;border-radius:10px}
 select{font:inherit;border:0;border-radius:8px;padding:4px 8px;background:rgba(255,255,255,.18);color:#fff}
 select option{color:#000}
 .wrap{flex:1;min-height:0;display:flex} #map{flex:1;min-width:0} .side{width:340px;max-width:46%;overflow:auto;border-left:1px solid var(--line);background:#fff;padding:10px}
 @media(max-width:680px){.wrap{flex-direction:column}.side{width:auto;max-width:none;border-left:0;border-top:1px solid var(--line);height:46%}}
 .ctl{padding:8px 12px;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12.5px}
 button{background:var(--teal);color:#fff;border:0;border-radius:8px;padding:7px 12px;font:inherit;font-weight:600;cursor:pointer}
 button.ghost{background:#fff;color:var(--teal);border:1px solid var(--line);font-weight:500;padding:5px 10px;border-radius:14px}
 button.ghost.on{background:var(--teal);color:#fff} label{color:var(--muted)}
 .stop{border-top:1px solid var(--line);padding:8px 0} .stop h4{margin:0 0 4px;font-size:13px} .stop .m{font-size:11px;color:var(--muted)}
 .dep{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px}
 .rt{font-weight:700;color:#fff;border-radius:6px;padding:1px 7px;font-size:11.5px;min-width:30px;text-align:center}
 .eta{margin-left:auto;font-weight:700} .eta.live::after{content:" ●";color:#7CFC00} .small{font-size:11px;color:var(--muted)}
 .delta.late{color:var(--warn)} .delta.early{color:#2563eb} .delta.ontime{color:var(--ok)}
 .alert{background:#fff4ec;border:1px solid #f3d3b5;color:var(--warn);border-radius:8px;padding:6px 8px;font-size:12px;margin-bottom:8px}
 .sched{background:#eef4f2;border:1px solid var(--line);color:#456;border-radius:8px;padding:6px 8px;font-size:11.5px;margin-bottom:8px}
 .hint{color:var(--muted);font-size:12px;line-height:1.5}
</style></head><body>
<header><b>Live ETA</b>
 <select id=city></select>
 <span class=pill id=mode_pill></span><span style=flex:1></span>
 <button class=ghost id=offbtn title="cache this city's schedule on your device">offline: off</button>
 <span class=pill id=clock></span></header>
<div class=ctl>
 <button id=loc>📍 My location</button>
 <span><label>walk radius</label> <input id=rad type=range min=200 max=1500 step=100 value=600> <span id=radlbl>600 m</span></span>
 <span id=modes><label>mode</label>
  <button class="ghost on" data-mode=all>all</button>
  <button class=ghost data-mode=train>train</button>
  <button class=ghost data-mode=bus>bus</button></span>
 <span id=routebox></span>
</div>
<div class=wrap><div id=map></div>
 <div class=side id=side><div class=hint>Allow location and you'll jump straight to nearby stations with their next departures — <b>live</b> where the agency reports it (with the gap vs schedule), or the <b>scheduled</b> times otherwise. Or tap the map / 📍 to drop a pin and set your walk radius.</div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const MBTA='https://api-v3.mbta.com';
const CITIES={
 // all cities read the box's GTFS index + server-cached tripupdates (live) — no per-client
 // transit-API calls, so no 429 rate-limiting. Boston's MBTA live is refreshed server-side.
 boston:{name:'Boston · MBTA',backend:'gtfs',center:[42.3656,-71.0612],tz:'America/New_York',base:'gtfs/boston'},
 toronto:{name:'Toronto · TTC',backend:'gtfs',center:[43.6561,-79.3802],tz:'America/Toronto',base:'gtfs/toronto'}
};
const $=id=>document.getElementById(id);
let CITY='boston', PIN=null, RADIUS=600, MODE='all', ROUTEFILTER=null, OFFLINE=false, timer=null;
let GIDX=null, GCELLS={};   // gtfs stops index + fetched cells
const map=L.map('map',{zoomControl:true}).setView(CITIES.boston.center,14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
let layers=L.layerGroup().addTo(map), vehLayer=L.layerGroup().addTo(map), pinMarker=null, radCircle=null;
const clock=()=>new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
setInterval(()=>$('clock').textContent=clock(),1000); $('clock').textContent=clock();
$('city').innerHTML=Object.entries(CITIES).map(([k,c])=>`<option value=${k}>${c.name}</option>`).join('');

function modeTypes(){ return MODE==='train'?[0,1,2]:MODE==='bus'?[3]:[0,1,2,3]; }
function distM(a,b){ const R=6371000,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180,la1=a[0]*Math.PI/180,la2=b[0]*Math.PI/180;
 const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(h)); }
function citySec(tz){ const p=new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}).formatToParts(new Date());
 const g=k=>+(p.find(x=>x.type===k).value); return g('hour')*3600+g('minute')*60+g('second'); }
const RTCOL={0:'1b7a4b',1:'c0392b',2:'6d28d9',3:'2563eb'};   // tram/subway/rail/bus colors for GTFS

function selectCity(k,keepPin){ CITY=k; $('city').value=k; const c=CITIES[CITY]; GIDX=null; GCELLS={}; ROUTEFILTER=null;
 $('mode_pill').textContent=c.backend==='mbta'?'live predictions':'schedule';
 if(!keepPin){ PIN=null; map.setView(c.center,14); layers.clearLayers(); vehLayer.clearLayers(); if(pinMarker)map.removeLayer(pinMarker); if(radCircle)map.removeLayer(radCircle);
  $('side').innerHTML='<div class=hint>Finding your location… or tap the map / 📍 to drop a pin in '+c.name.split(' · ')[0]+'.</div>'; }
 loadOffline(); }
$('city').onchange=e=>selectCity(e.target.value);
$('rad').oninput=e=>{ RADIUS=+e.target.value; $('radlbl').textContent=RADIUS+' m'; };
$('rad').onchange=()=>PIN&&refresh();
$('modes').onclick=e=>{ if(!e.target.dataset.mode)return; MODE=e.target.dataset.mode; ROUTEFILTER=null;
 document.querySelectorAll('#modes button').forEach(b=>b.classList.toggle('on',b===e.target)); PIN&&refresh(); };
// nearest configured city to a GPS fix (within ~150 km), so location auto-selects the city
function nearestCity(ll){ let best=null,bd=150000; for(const [k,c] of Object.entries(CITIES)){ const d=distM(ll,c.center); if(d<bd){bd=d;best=k;} } return best; }
function autoLocate(silent){ if(!navigator.geolocation){ if(!silent)alert('no geolocation on this device'); return; }
 $('loc').textContent='locating…';
 navigator.geolocation.getCurrentPosition(p=>{ const ll=[p.coords.latitude,p.coords.longitude]; const ci=nearestCity(ll);
   if(ci&&ci!==CITY) selectCity(ci,true);            // GPS → auto-pick the city you're in
   setPin(ll); map.setView(ll,15); $('loc').textContent='📍 My location'; },
  e=>{ $('loc').textContent='📍 My location'; if(!silent)alert('location unavailable — tap the map to drop a pin'); },
  {enableHighAccuracy:true,timeout:9000,maximumAge:60000}); }
$('loc').onclick=()=>autoLocate(false);
$('offbtn').onclick=()=>{ OFFLINE=!OFFLINE; $('offbtn').textContent='offline: '+(OFFLINE?'on':'off'); $('offbtn').classList.toggle('on',OFFLINE);
 if(OFFLINE&&CITIES[CITY].backend==='gtfs') cacheCity(); };
map.on('click',e=>setPin([e.latlng.lat,e.latlng.lng]));
function setPin(ll){ PIN=ll; if(pinMarker)map.removeLayer(pinMarker); if(radCircle)map.removeLayer(radCircle);
 pinMarker=L.marker(ll).addTo(map); radCircle=L.circle(ll,{radius:RADIUS,color:'#00695C',weight:1,fillOpacity:.05}).addTo(map);
 refresh(); if(timer)clearInterval(timer); if(CITIES[CITY].backend==='mbta') timer=setInterval(refresh,20000); }

async function refresh(){ if(!PIN)return; if(radCircle){radCircle.setRadius(RADIUS);radCircle.setLatLng(PIN);}
 try{ const r= CITIES[CITY].backend==='mbta' ? await mbta() : await gtfs();
  renderRouteChips(r.routes||{}); render(r); }catch(e){ $('side').innerHTML='<div class=alert>'+e.message+'</div>'; } }

// ---------- common render ----------
function render(r){ layers.clearLayers();
 let html=''; if(r.warn) html+='<div class=sched>'+r.warn+'</div>'; if(r.alert) html='<div class=alert>⚠ '+r.alert+'</div>'+html;
 r.stops.forEach(s=>{ L.marker([s.lat,s.lon],{icon:L.divIcon({className:'',html:'<div style="background:#00695C;color:#fff;border-radius:50%;width:9px;height:9px;border:2px solid #fff"></div>',iconSize:[13,13]})}).addTo(layers).bindPopup(s.name);
  let deps=s.deps; if(ROUTEFILTER) deps=deps.filter(d=>d.route===ROUTEFILTER); deps=deps.slice(0,4);
  html+=`<div class=stop><h4>${s.name}</h4><div class=m>${s.dist} m · ~${s.walk} min walk</div>`;
  if(!deps.length) html+='<div class=small>no upcoming departures'+(ROUTEFILTER?' on this route':'')+'</div>';
  deps.forEach(d=>{ let dl=''; if(d.delta!=null){ const c=d.delta>=2?'late':d.delta<=-2?'early':'ontime'; dl=`<span class="small delta ${c}">${d.delta>0?'+':''}${d.delta}m</span>`; }
   html+=`<div class=dep><span class=rt style="background:#${d.color};color:#${d.tcol||'fff'}">${d.route}</span><span>${d.headsign||''}</span>
    <span class="eta ${d.live?'live':''}">${d.in_min<=0?'now':d.in_min+'m'}</span>${dl}</div>`; });
  html+='</div>'; });
 $('side').innerHTML=html; renderVehicles(r.vehicles||[]);
}
function renderVehicles(vs){ vehLayer.clearLayers(); vs.forEach(v=>{ const arrow=v.bearing!=null?`<div style="transform:rotate(${v.bearing}deg);font-size:14px;line-height:1;color:#${v.color}">▲</div>`:'●';
 L.marker([v.lat,v.lon],{icon:L.divIcon({className:'',html:`<div title="${v.label||''}">${arrow}</div>`,iconSize:[16,16]})}).addTo(vehLayer); }); }
function renderRouteChips(routes){ const keys=Object.keys(routes); if(keys.length<2){$('routebox').innerHTML='';return;}
 $('routebox').innerHTML='<label>route</label> '+`<button class="ghost ${ROUTEFILTER?'':'on'}" onclick="setRoute(null)">all</button> `+
  keys.slice(0,8).map(id=>`<button class="ghost ${ROUTEFILTER===id?'on':''}" onclick="setRoute('${id}')">${id}</button>`).join(' '); }
function setRoute(id){ ROUTEFILTER=id; render.lastRoutesAreFresh=false; PIN&&refresh(); }

// ---------- MBTA backend (live) ----------
async function api(p){ const r=await fetch(MBTA+p); if(!r.ok)throw new Error('MBTA '+r.status); return r.json(); }
function rel(d){ const m={}; (d.included||[]).forEach(i=>m[i.type+'/'+i.id]=i); return m; }
function mins(t){ return t?Math.round((new Date(t)-new Date())/60000):null; }
async function mbta(){ const [la,lo]=PIN, degR=(RADIUS/111000).toFixed(4);
 const sd=await api(`/stops?filter[latitude]=${la}&filter[longitude]=${lo}&filter[radius]=${degR}&filter[route_type]=${modeTypes().join(',')}&page[limit]=25`);
 if(!sd.data.length) return {stops:[],routes:{},warn:'No stations within '+RADIUS+' m — widen the radius.'};
 const ids=sd.data.map(s=>s.id).join(',');
 const pd=await api(`/predictions?filter[stop]=${ids}&include=route,trip&sort=arrival_time&page[limit]=80`); const R=rel(pd);
 const tripIds=[...new Set(pd.data.map(p=>(p.relationships.trip.data||{}).id).filter(Boolean))].slice(0,40);
 let sched={}; if(tripIds.length){ const sc=await api(`/schedules?filter[trip]=${tripIds.join(',')}&filter[stop]=${ids}&page[limit]=200`).catch(()=>({data:[]}));
  (sc.data||[]).forEach(s=>{ const tr=s.relationships.trip.data; if(tr){ const t=s.attributes.arrival_time||s.attributes.departure_time; if(t) sched[tr.id+'/'+s.relationships.stop.data.id]=t; } }); }
 const routes={}, byStop={}; sd.data.forEach(s=>byStop[s.id]={name:s.attributes.name,lat:s.attributes.latitude,lon:s.attributes.longitude,
  dist:Math.round(distM(PIN,[s.attributes.latitude,s.attributes.longitude])),walk:Math.max(1,Math.round(distM(PIN,[s.attributes.latitude,s.attributes.longitude])/80)),deps:[]});
 pd.data.forEach(p=>{ const m=mins(p.attributes.arrival_time||p.attributes.departure_time); if(m==null||m<0)return;
  const ro=R['route/'+p.relationships.route.data.id], tr=R['trip/'+(p.relationships.trip.data||{}).id], g=byStop[p.relationships.stop.data.id]; if(!g)return;
  const k=((p.relationships.trip.data||{}).id)+'/'+p.relationships.stop.data.id, sct=sched[k];
  let delta=null; if(sct) delta=Math.round((new Date(p.attributes.arrival_time||p.attributes.departure_time)-new Date(sct))/60000);
  const name=ro?(ro.attributes.short_name||ro.id):'?'; routes[name]=1;
  g.deps.push({route:name,color:ro?ro.attributes.color:'888',tcol:ro?ro.attributes.text_color:'fff',headsign:tr?tr.attributes.headsign:'',in_min:m,live:true,delta}); });
 const stops=Object.values(byStop).filter(s=>s.deps.length).sort((a,b)=>a.dist-b.dist);
 const veh=await mbtaVehicles(Object.keys(routes)); const alert=await mbtaAlert(Object.keys(routes));
 return {stops,routes,vehicles:veh,alert};
}
async function mbtaVehicles(rs){ if(!rs.length)return[]; try{ const vd=await api(`/vehicles?filter[route]=${(ROUTEFILTER?[ROUTEFILTER]:rs).join(',')}&include=route&page[limit]=120`); const R=rel(vd);
 return vd.data.filter(v=>v.attributes.latitude!=null).map(v=>{ const ro=R['route/'+v.relationships.route.data.id];
  return {lat:v.attributes.latitude,lon:v.attributes.longitude,bearing:v.attributes.bearing,color:ro?ro.attributes.color:'00695C',label:(ro?ro.attributes.short_name||ro.id:'')+' '+(v.attributes.current_status||'')}; }); }catch(e){return[];} }
async function mbtaAlert(rs){ if(!rs.length)return null; try{ const ad=await api(`/alerts?filter[route]=${rs.join(',')}&filter[severity]=3,4,5,6,7,8,9,10`);
 return ad.data&&ad.data.length?(ad.data[0].attributes.short_header||ad.data[0].attributes.header||'').slice(0,140)+(ad.data.length>1?` (+${ad.data.length-1} more)`:''):null; }catch(e){return null;} }

// ---------- GTFS backend (scheduled, offline-cacheable) ----------
async function gget(url){ if(OFFLINE){ const c=localStorage.getItem('g:'+CITY+':'+url); if(c)return JSON.parse(c); }
 const r=await fetch(url); if(!r.ok)throw new Error('GTFS '+r.status+' '+url); const j=await r.json();
 if(OFFLINE) try{localStorage.setItem('g:'+CITY+':'+url,JSON.stringify(j));}catch(e){} return j; }
async function gtfs(){ const c=CITIES[CITY]; if(!GIDX) GIDX=await gget(c.base+'/stops.json');
 const [la,lo]=PIN, cell=GIDX.cell_deg;
 const near=GIDX.stops.map(s=>({id:s[0],lat:s[1],lon:s[2],name:s[3],dist:Math.round(distM(PIN,[s[1],s[2]]))}))
   .filter(s=>s.dist<=RADIUS).sort((a,b)=>a.dist-b.dist).slice(0,25);
 if(!near.length) return {stops:[],routes:{},warn:'No stations within '+RADIUS+' m — widen the radius.'};
 const keys=new Set(near.map(s=>Math.floor(s.lat/cell)+'_'+Math.floor(s.lon/cell)));
 await Promise.all([...keys].map(async k=>{ if(!GCELLS[k]) GCELLS[k]=await gget(c.base+'/cells/'+k+'.json').catch(()=>({})); }));
 // LIVE OVERLAY: GTFS-realtime TripUpdates (if the city has a reachable feed)
 let TU=null; try{ TU=(await fetch(c.base+'/tripupdates.json').then(r=>r.ok?r.json():null))?.trips; }catch(e){}
 const now=citySec(c.tz), nowU=Date.now()/1000, midnight=nowU-now, routes={};
 near.forEach(s=>{ const k=Math.floor(s.lat/cell)+'_'+Math.floor(s.lon/cell), cd=(GCELLS[k]||{})[s.id]||[];
  s.walk=Math.max(1,Math.round(s.dist/80));
  s.deps=cd.filter(d=>modeTypes().includes(d[4])).map(d=>{
   let in_min=Math.round((d[0]-now)/60), live=false, delta=null;
   const lu=TU&&TU[d[5]]&&TU[d[5]][s.id];                 // live predicted unix time for this trip+stop
   if(lu){ in_min=Math.round((lu-nowU)/60); delta=Math.round((lu-(midnight+d[0]))/60); live=true; }
   else if(d[0]<now) return null;                          // scheduled & already past
   if(in_min<-1) return null;
   routes[d[1]]=1; return {route:d[1],color:RTCOL[d[4]]||'00695C',tcol:'fff',headsign:d[2],in_min,live,delta}; })
   .filter(Boolean).sort((a,b)=>a.in_min-b.in_min).slice(0,4); });
 const warn=TU?`Live where the agency reports it (${GIDX.date} schedule otherwise).`
   :`Scheduled times (${GIDX.date}) — not live. May not reflect delays; go online for the most accurate data.`+(OFFLINE?' · cached on this device':'');
 return {stops:near.filter(s=>s.deps.length),routes,vehicles:[],warn};
}
async function cacheCity(){ const c=CITIES[CITY]; try{ const idx=await gget(c.base+'/stops.json'); $('offbtn').textContent='offline: caching…';
 // cache the cells around the current pin (or all if small)
 const cells=new Set(); idx.stops.forEach(s=>cells.add(Math.floor(s[1]/idx.cell_deg)+'_'+Math.floor(s[2]/idx.cell_deg)));
 let n=0; for(const k of cells){ try{ await gget(c.base+'/cells/'+k+'.json'); n++; }catch(e){} }
 $('offbtn').textContent='offline: on'; alert(`Cached ${idx.n} stops / ${n} areas for ${c.name.split(' · ')[0]} (${idx.date}). Works offline; schedule only — go online for live.`); }catch(e){ alert('cache failed: '+e.message); } }
function loadOffline(){ OFFLINE=false; $('offbtn').textContent='offline: off'; $('offbtn').classList.remove('on'); }
$('mode_pill').textContent='live predictions';
// On open: ask for GPS and auto-locate (silent fallback to tap-the-map if denied/unavailable)
autoLocate(true);
</script></body></html>
